app = "announcement-bar-app-lqjqja"
primary_region = "iad"

[build]

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

# --- Désactivation temporaire des health checks pour permettre le debug ---
# (aucun bloc [[services.tcp_checks]] n'est défini)

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
