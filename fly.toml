# Nom de l'application Fly.io (doit correspondre exactement au nom créé dans l'interface)
app = "announcement-bar-app-pqncqa"
primary_region = "ams"

[build]

[env]
  # Fly.io injecte automatiquement PORT=8080. Votre server.mjs l'utilise.
  # Ajoutez ici d'autres variables d'environnement non sensibles si nécessaire.

[[services]]
  # Port sur lequel votre application écoute à l'intérieur du conteneur.
  # Puisque vous avez modifié EXPOSE 8080 dans le Dockerfile (option recommandée),
  # et que server.mjs utilise process.env.PORT (qui vaut 8080 par défaut sur Fly),
  # la valeur doit être 8080.
  internal_port = 8080
  protocol = "tcp"

  # Configuration des ports exposés publiquement
  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  # Health check pour s'assurer que l'application tourne
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1s"

# Ressources allouées par machine (modifiable plus tard dans l'interface)
[[vm]]
  memory = "256mb"




  [[services.tcp_checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "30s"
  cpu_kind = "shared"
  cpus = 1
